networks:
  shared-proxy:
    external: true

services:
  backend:
    build: ./backend
    container_name: severbus-backend
    restart: unless-stopped
    expose:
      - "3000"
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
    volumes:
      - ./data:/app/data
    networks:
      - shared-proxy
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
